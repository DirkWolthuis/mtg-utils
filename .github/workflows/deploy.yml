name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-engine-server:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Create Railway PR environment
        if: github.event_name == 'pull_request'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -s -o /dev/null -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation{environmentCreate(input:{name:\\\"pr-$PR_NUMBER\\\",projectId:\\\"$RAILWAY_PROJECT_ID\\\"}){id}}\"}"

      - name: Deploy to Railway (production)
        if: github.ref == 'refs/heads/main'
        run: railway up --service mtg-util-game-server --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}

      - name: Deploy to Railway (preview)
        if: github.event_name == 'pull_request'
        run: railway up --service mtg-util-game-server --environment pr-${{ github.event.pull_request.number }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}

  cleanup-railway-env:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Railway PR environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ENV_ID=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query{project(id:\\\"$RAILWAY_PROJECT_ID\\\"){environments{edges{node{id,name}}}}}\"}" | \
            jq -r ".data.project.environments.edges[] | select(.node.name==\"pr-$PR_NUMBER\") | .node.id")

          [ -n "$ENV_ID" ] && curl -s -o /dev/null -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation{environmentDelete(id:\\\"$ENV_ID\\\")}\"}"
