name: PR validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: npm

      - run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
